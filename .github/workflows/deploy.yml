name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd ~/apps/champion
            git pull origin main
            docker build -f Dockerfile.backend -t champion-trader .
            docker stop champion || true
            docker rm champion || true
            docker run -d --name champion --env-file .env -p 8003:8003 --restart unless-stopped champion-trader
            sleep 3
            curl -sf http://localhost:8003/health
            echo "✅ Deploy successful"
